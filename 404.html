<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません ── PATTI CREATIVE PRODUCT</title>
<meta name="theme-color" content="#1a1a24">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/patti_logo.png">
<style>
  :root { --pink:#D6336C; --yellow:#FFC400; --bg:#1a1a24; --card:#232331; --border:#2c2c3a; --text:#fff; --text-sub:#ccc; --text-dim:#bbb; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Zen Maru Gothic', sans-serif; font-weight:500; line-height:1.8;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px;
  }
  .box { max-width:520px; }
  img.logo { width:80px; height:auto; margin-bottom:16px; opacity:.9; }
  .code { font-weight:900; font-size:clamp(3rem,12vw,5rem); color:var(--pink); letter-spacing:.05em; }
  h1 { font-weight:700; font-size:1.3rem; margin:8px 0 12px; }
  p { color:var(--text-sub); font-size:.95rem; margin-bottom:24px; }
  .btn {
    display:inline-block; background:var(--pink); color:#fff; text-decoration:none;
    font-weight:700; padding:12px 36px; border-radius:999px;
    box-shadow:0 6px 24px rgba(214,51,108,.45); transition:transform .15s ease;
  }
  .btn:hover { transform:translateY(-2px); }
  footer { margin-top:28px; color:var(--text-dim); font-size:.78rem; }
</style>
</head>
<body>
  <div class="box">
    <img class="logo" src="assets/patti_logo.png" alt="PATTI ロゴ">

    <p>お探しのページは、移動したか無くなったみたいです。<br>ツールの棚から探し直してみてください。</p>
    <a class="btn" href="/">🧰 ツールの棚にもどる</a>
    <footer>© 2026 STUDIO PATTI LLC ── 合同会社スタジオパッチ（愛知県一宮市）</footer>
  </div>
</body>
</html>
